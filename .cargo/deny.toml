# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    { id = "RUSTSEC-2023-0089", reason = "atomic-polyfill transitive via postcard/heapless; unmaintained, no CVE" },
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "Unicode-3.0",
    "ISC",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
exceptions = []

[bans]
# Transitive stacks often pull two major lines (e.g. tower-lsp vs axum, notify vs rustls). Unifying
# is upstream work; advisories + licenses still apply per crate.
multiple-versions = "allow"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

