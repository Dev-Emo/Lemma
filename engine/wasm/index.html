<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemma WASM Playground</title>
    <script src="vendor/vs/loader.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
        }

        h1 {
            color: #333;
        }

        #editor {
            width: 100%;
            height: 400px;
        }

        .editor-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
        }

        .editor-actions .hint {
            margin-top: 0;
        }

        .editor-actions .format-link {
            color: #666;
            font-size: 13px;
            text-decoration: none;
        }

        .editor-actions .format-link:hover {
            text-decoration: underline;
        }

        .hint {
            margin-top: 8px;
            color: #666;
            font-size: 13px;
        }

        /* --- Editor + status bar (IDE-style) --- */

        .editor-wrap {
            border: 1px solid #ccc;
            border-radius: 3px;
            overflow: hidden;
        }

        .editor-wrap #editor {
            border: none;
            border-radius: 0;
        }

        #status {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 22px;
            padding: 2px 10px;
            border-top: 1px solid #ddd;
            background: #f4f4f4;
            font-size: 12px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            color: #333;
        }

        #status.ok {
            background: #f4f4f4;
            border-top-color: #e8e8e8;
        }

        #status.err {
            background: #f8d7da;
            border-top-color: #dc3545;
            color: #721c24;
        }

        #status.warn {
            background: #fff3cd;
            border-top-color: #ffc107;
            color: #856404;
        }

        #status .status-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- Spec cards --- */

        .spec-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
        }

        .spec-card h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
        }

        #spec-select {
            font-size: 14px;
            padding: 6px 10px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }

        /* --- Fact input rows --- */

        .facts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .fact-row {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 10px;
            align-items: center;
        }

        .fact-row .label {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 13px;
            color: #111;
        }

        .fact-row .label .required {
            color: #dc3545;
            font-weight: 700;
            margin-left: 6px;
        }

        .fact-row .input-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .fact-row select,
        .fact-row input {
            width: 100%;
        }

        .fact-row input[type="checkbox"] {
            width: auto;
            transform: translateY(1px);
        }

        .fact-help {
            grid-column: 2 / 3;
            color: #666;
            font-size: 12px;
            margin-top: -6px;
        }

        /* --- Actions row --- */

        .spec-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 10px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 3px;
            cursor: pointer;
            margin: 0;
        }

        button:hover {
            background: #0056b3;
        }

        button.secondary {
            background: #6c757d;
        }

        button.secondary:hover {
            background: #5a6268;
        }

        /* --- Results table --- */

        .results-table {
            margin-top: 10px;
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        .results-table th {
            background: #f0f0f0;
            padding: 10px;
            text-align: left;
            border-bottom: 2px solid #ddd;
        }

        .results-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #eee;
        }

        .results-table .rule-name {
            font-weight: 500;
            color: #007bff;
        }

        .results-table .value {
            font-family: monospace;
        }

        .results-table .veto {
            color: #dc3545;
            font-style: italic;
        }

        .result-message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 3px;
            white-space: pre-wrap;
            font-family: monospace;
        }

        .result-message.error {
            background: #f8d7da;
            border: 1px solid #dc3545;
        }

        .result-message.success {
            background: #d4edda;
            border: 1px solid #28a745;
        }

        /* --- Responsive --- */

        @media (max-width: 740px) {
            .fact-row {
                grid-template-columns: 1fr;
            }

            .fact-help {
                grid-column: 1 / 2;
                margin-top: -2px;
            }
        }
    </style>
</head>

<body>
    <h1>Lemma WASM Playground</h1>

    <div class="section">
        <div class="editor-wrap">
            <div id="editor"></div>
            <div id="status" class="warn">
                <span class="status-text">Initializing…</span>
            </div>
        </div>
        <div class="editor-actions">
            <span class="hint">Edits auto-load.</span>
            <a href="#" id="format-btn" class="format-link" title="Format spec">Format</a>
        </div>
    </div>

    <div class="section">
        <div style="display:flex;align-items:center;justify-content:space-between;">
            <h2 style="margin:0;">Specs</h2>
            <select id="spec-select">
                <option value="">No specs loaded</option>
            </select>
        </div>
        <div id="spec-detail"></div>
    </div>

    <script type="module">
        import { init, Engine } from '../pkg/lemma.js';
        import { serve, ServerConfig } from '../pkg/lsp.js';
        import { registerLemmaLanguage, registerLspProviders } from '../pkg/monaco.js';
        import { LspClient } from '../pkg/lsp-client.js';

        // ---------------------------------------------------------------
        // State
        // ---------------------------------------------------------------

        let engine = null;
        let monacoEditor = null;
        let editorReady = false;
        let loadTimer = null;
        let lspClient = null;
        let lspVersion = 0;
        const DOC_URI = 'file:///playground/wasm.lemma';

        const state = {
            specs: [],
            schemas: {},
            factValues: {},
            evalResults: {},
        };

        function datetimeValueToString(dt) {
            if (!dt || typeof dt !== 'object') return '';
            var s = String(dt.year);
            if (dt.month) {
                s += '-' + String(dt.month).padStart(2, '0');
                if (dt.day) {
                    s += '-' + String(dt.day).padStart(2, '0');
                    if (dt.hour || dt.minute || dt.second) {
                        s += 'T' + String(dt.hour || 0).padStart(2, '0')
                            + ':' + String(dt.minute || 0).padStart(2, '0')
                            + ':' + String(dt.second || 0).padStart(2, '0');
                        if (dt.timezone) {
                            var oh = dt.timezone.offset_hours || 0;
                            var om = dt.timezone.offset_minutes || 0;
                            if (oh === 0 && om === 0) { s += 'Z'; }
                            else {
                                s += (oh >= 0 ? '+' : '-')
                                    + String(Math.abs(oh)).padStart(2, '0')
                                    + ':' + String(om).padStart(2, '0');
                            }
                        }
                    }
                }
            }
            return s;
        }

        function specKey(entry) {
            if (entry.effective_from) return entry.name + ' ' + datetimeValueToString(entry.effective_from);
            return entry.name;
        }

        function specEffective(key) {
            var entry = state.specs.find(function (d) { return specKey(d) === key; });
            if (entry && entry.effective_from) return datetimeValueToString(entry.effective_from);
            return null;
        }

        function specName(key) {
            var entry = state.specs.find(function (d) { return specKey(d) === key; });
            return entry ? entry.name : key;
        }

        function factValuesStorageKey(specName) {
            return 'lemma_playground:spec:' + specName;
        }

        function persistFactValues(specName) {
            try {
                localStorage.setItem(factValuesStorageKey(specName), JSON.stringify(state.factValues[specName] || {}));
            } catch (_) { }
        }

        function loadFactValuesFromStorage(specName) {
            if (state.factValues[specName] && Object.keys(state.factValues[specName]).length > 0) return;
            try {
                const raw = localStorage.getItem(factValuesStorageKey(specName));
                if (raw) {
                    const parsed = JSON.parse(raw);
                    if (parsed && typeof parsed === 'object') {
                        state.factValues[specName] = parsed;
                    }
                }
            } catch (_) { }
            if (!state.factValues[specName]) state.factValues[specName] = {};
        }

        // ---------------------------------------------------------------
        // Status panel
        // ---------------------------------------------------------------

        function setStatus(kind, title, message) {
            const element = document.getElementById('status');
            element.classList.remove('ok', 'err', 'warn');
            if (kind === 'ok') element.classList.add('ok');
            else if (kind === 'err') element.classList.add('err');
            else element.classList.add('warn');
            const text = message ? title + ': ' + message : (title || '');
            element.querySelector('.status-text').textContent = text;
            element.title = text;
        }

        // ---------------------------------------------------------------
        // Schema introspection
        // ---------------------------------------------------------------

        function specKind(schemaType) {
            const specifications = schemaType && schemaType.specifications;
            if (!specifications || typeof specifications !== 'object') return null;
            const keys = Object.keys(specifications);
            if (keys.length !== 1) return null;
            return keys[0];
        }

        function specData(schemaType) {
            const kind = specKind(schemaType);
            if (kind === null) return null;
            return schemaType.specifications[kind] || null;
        }

        function storedFromLiteralValue(lit, kind) {
            if (!lit || typeof lit !== 'object' || !lit.value) return undefined;
            const v = lit.value;
            const display = typeof lit.display_value === 'string' ? lit.display_value : '';
            if (kind === 'Boolean') return v.boolean === true;
            if (kind === 'Number') return v.number != null ? String(v.number) : display;
            if (kind === 'Text') return typeof v.text === 'string' ? v.text : display;
            if (kind === 'Scale' && Array.isArray(v.scale)) return { amount: String(v.scale[0] ?? ''), unit: String(v.scale[1] ?? '') };
            if (kind === 'Ratio') {
                if (Array.isArray(v.ratio)) return { amount: String(v.ratio[0] ?? ''), unit: (v.ratio[1] != null ? String(v.ratio[1]) : 'ratio') };
                return { amount: display, unit: 'ratio' };
            }
            if (kind === 'Date' || kind === 'Time' || kind === 'Duration') return display;
            return display;
        }

        // ---------------------------------------------------------------
        // Fact value serialization (state -> engine JSON)
        // ---------------------------------------------------------------

        function serializeFactValues(specName) {
            const values = state.factValues[specName];
            if (!values) return {};

            const schema = state.schemas[specName];
            if (!schema || !Array.isArray(schema.facts)) return {};

            const result = {};

            for (const fact of schema.facts) {
                const name = fact.name;
                const entry = values[name];
                if (entry === undefined || entry === null) continue;

                const kind = specKind(fact.schemaType);

                if (kind === 'Boolean') {
                    result[name] = entry === true;
                    continue;
                }

                if (kind === 'Scale') {
                    if (typeof entry === 'object' && entry !== null) {
                        const amount = (entry.amount || '').toString().trim();
                        const unit = (entry.unit || '').toString().trim();
                        if (amount === '') continue;
                        if (unit !== '') {
                            result[name] = amount + ' ' + unit;
                        } else {
                            result[name] = Number(amount);
                        }
                    }
                    continue;
                }

                if (kind === 'Ratio') {
                    if (typeof entry === 'object' && entry !== null) {
                        const amount = (entry.amount || '').toString().trim();
                        const unit = (entry.unit || '').toString().trim();
                        if (amount === '') continue;
                        if (unit === 'percent') {
                            result[name] = amount + '%';
                        } else if (unit === 'permille') {
                            result[name] = amount + '%%';
                        } else {
                            result[name] = Number(amount);
                        }
                    }
                    continue;
                }

                if (kind === 'Number') {
                    const stringValue = entry.toString().trim();
                    if (stringValue === '') continue;
                    result[name] = Number(stringValue);
                    continue;
                }

                const stringValue = entry.toString().trim();
                if (stringValue !== '') {
                    result[name] = stringValue;
                }
            }

            return result;
        }

        // ---------------------------------------------------------------
        // DOM: Build a fact input row
        // ---------------------------------------------------------------

        function buildFactRow(specName, fact) {
            const name = fact.name;
            const schemaType = fact.schemaType;
            const kind = specKind(schemaType);
            const spec = specData(schemaType);

            const row = document.createElement('div');
            row.className = 'fact-row';
            row.dataset.factName = name;
            row.dataset.typeKind = kind || 'unknown';

            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = name;
            row.appendChild(label);

            const inputGroup = document.createElement('div');
            inputGroup.className = 'input-group';

            if (!state.factValues[specName]) {
                state.factValues[specName] = {};
            }
            let currentValue = state.factValues[specName][name];
            if (currentValue === undefined && fact.defaultValue) {
                const fromSpec = storedFromLiteralValue(fact.defaultValue, kind);
                if (fromSpec !== undefined) {
                    state.factValues[specName][name] = fromSpec;
                    currentValue = fromSpec;
                    persistFactValues(specName);
                }
            }

            if (kind === 'Boolean') {
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                if (currentValue === true) {
                    checkbox.checked = true;
                } else if (currentValue === undefined && spec && typeof spec.default === 'boolean') {
                    checkbox.checked = spec.default;
                    state.factValues[specName][name] = spec.default;
                }
                checkbox.addEventListener('change', function () {
                    state.factValues[specName][name] = this.checked;
                    persistFactValues(specName);
                });
                inputGroup.appendChild(checkbox);

            } else if (kind === 'Text') {
                const options = (spec && Array.isArray(spec.options)) ? spec.options : [];

                if (options.length > 0) {
                    const select = document.createElement('select');
                    const emptyOption = document.createElement('option');
                    emptyOption.value = '';
                    emptyOption.textContent = '';
                    select.appendChild(emptyOption);
                    for (const optionValue of options) {
                        const option = document.createElement('option');
                        option.value = optionValue;
                        option.textContent = optionValue;
                        select.appendChild(option);
                    }
                    if (typeof currentValue === 'string') {
                        select.value = currentValue;
                    } else if (currentValue === undefined && spec && typeof spec.default === 'string') {
                        select.value = spec.default;
                        state.factValues[specName][name] = spec.default;
                    }
                    select.addEventListener('change', function () {
                        state.factValues[specName][name] = this.value;
                        persistFactValues(specName);
                    });
                    inputGroup.appendChild(select);
                } else {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.placeholder = 'text';
                    if (typeof currentValue === 'string') {
                        input.value = currentValue;
                    } else if (currentValue === undefined && spec && typeof spec.default === 'string') {
                        input.value = spec.default;
                        state.factValues[specName][name] = spec.default;
                    }
                    input.addEventListener('input', function () {
                        state.factValues[specName][name] = this.value;
                        persistFactValues(specName);
                    });
                    inputGroup.appendChild(input);
                }

            } else if (kind === 'Number') {
                const input = document.createElement('input');
                input.type = 'number';
                input.step = 'any';
                input.placeholder = 'number';
                if (currentValue !== undefined && currentValue !== null) {
                    input.value = currentValue.toString();
                } else if (currentValue === undefined && spec && spec.default !== null && spec.default !== undefined) {
                    const def = spec.default;
                    const defStr = typeof def === 'number' ? String(def) : String(def);
                    input.value = defStr;
                    state.factValues[specName][name] = defStr;
                }
                input.addEventListener('input', function () {
                    state.factValues[specName][name] = this.value;
                    persistFactValues(specName);
                });
                inputGroup.appendChild(input);

            } else if (kind === 'Scale') {
                const units = (spec && Array.isArray(spec.units)) ? spec.units : [];
                const storedEntry = (typeof currentValue === 'object' && currentValue !== null) ? currentValue : {};

                const amountInput = document.createElement('input');
                amountInput.type = 'number';
                amountInput.step = 'any';
                amountInput.placeholder = units.length > 0 ? 'amount' : 'number';
                if (storedEntry.amount !== undefined) {
                    amountInput.value = storedEntry.amount;
                }

                if (!state.factValues[specName][name] || typeof state.factValues[specName][name] !== 'object') {
                    state.factValues[specName][name] = { amount: storedEntry.amount || '', unit: storedEntry.unit || '' };
                }

                amountInput.addEventListener('input', function () {
                    if (!state.factValues[specName][name] || typeof state.factValues[specName][name] !== 'object') {
                        state.factValues[specName][name] = { amount: '', unit: '' };
                    }
                    state.factValues[specName][name].amount = this.value;
                    persistFactValues(specName);
                });
                inputGroup.appendChild(amountInput);

                if (units.length > 0) {
                    const unitSelect = document.createElement('select');
                    for (const unitDefinition of units) {
                        const option = document.createElement('option');
                        option.value = unitDefinition.name;
                        option.textContent = unitDefinition.name;
                        unitSelect.appendChild(option);
                    }
                    const defaultUnit = storedEntry.unit && units.some(function (u) { return u.name === storedEntry.unit; })
                        ? storedEntry.unit
                        : units[0].name;
                    unitSelect.value = defaultUnit;
                    state.factValues[specName][name].unit = defaultUnit;
                    unitSelect.addEventListener('change', function () {
                        state.factValues[specName][name].unit = this.value;
                        persistFactValues(specName);
                    });
                    inputGroup.appendChild(unitSelect);
                }

            } else if (kind === 'Ratio') {
                const units = (spec && Array.isArray(spec.units)) ? spec.units : [];
                const storedEntry = (typeof currentValue === 'object' && currentValue !== null) ? currentValue : {};

                const amountInput = document.createElement('input');
                amountInput.type = 'number';
                amountInput.step = 'any';
                amountInput.placeholder = 'amount';
                if (storedEntry.amount !== undefined) {
                    amountInput.value = storedEntry.amount;
                }

                if (!state.factValues[specName][name] || typeof state.factValues[specName][name] !== 'object') {
                    state.factValues[specName][name] = { amount: storedEntry.amount || '', unit: storedEntry.unit || 'ratio' };
                }

                amountInput.addEventListener('input', function () {
                    if (!state.factValues[specName][name] || typeof state.factValues[specName][name] !== 'object') {
                        state.factValues[specName][name] = { amount: '', unit: 'ratio' };
                    }
                    state.factValues[specName][name].amount = this.value;
                    persistFactValues(specName);
                });
                inputGroup.appendChild(amountInput);

                const unitSelect = document.createElement('select');
                const ratioOption = document.createElement('option');
                ratioOption.value = 'ratio';
                ratioOption.textContent = 'ratio';
                unitSelect.appendChild(ratioOption);
                for (const unitDefinition of units) {
                    const option = document.createElement('option');
                    option.value = unitDefinition.name;
                    option.textContent = unitDefinition.name === 'percent' ? '%' : unitDefinition.name;
                    unitSelect.appendChild(option);
                }
                if (storedEntry.unit) {
                    unitSelect.value = storedEntry.unit;
                }
                unitSelect.addEventListener('change', function () {
                    state.factValues[specName][name].unit = this.value;
                    persistFactValues(specName);
                });
                inputGroup.appendChild(unitSelect);

            } else if (kind === 'Date') {
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = 'YYYY-MM-DD';
                if (typeof currentValue === 'string') {
                    input.value = currentValue;
                }
                input.addEventListener('input', function () {
                    state.factValues[specName][name] = this.value;
                    persistFactValues(specName);
                });
                inputGroup.appendChild(input);

            } else if (kind === 'Time') {
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = 'HH:MM[:SS]';
                if (typeof currentValue === 'string') {
                    input.value = currentValue;
                }
                input.addEventListener('input', function () {
                    state.factValues[specName][name] = this.value;
                    persistFactValues(specName);
                });
                inputGroup.appendChild(input);

            } else if (kind === 'Duration') {
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = 'e.g. 5 days';
                if (typeof currentValue === 'string') {
                    input.value = currentValue;
                }
                input.addEventListener('input', function () {
                    state.factValues[specName][name] = this.value;
                    persistFactValues(specName);
                });
                inputGroup.appendChild(input);

            } else {
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = 'value';
                if (typeof currentValue === 'string') {
                    input.value = currentValue;
                }
                input.addEventListener('input', function () {
                    state.factValues[specName][name] = this.value;
                    persistFactValues(specName);
                });
                inputGroup.appendChild(input);
            }

            row.appendChild(inputGroup);

            const helpText = (spec && typeof spec.help === 'string' && spec.help.trim() !== '') ? spec.help.trim() : null;
            if (helpText !== null) {
                const helpElement = document.createElement('div');
                helpElement.className = 'fact-help';
                helpElement.textContent = helpText;
                row.appendChild(helpElement);
            }

            return row;
        }

        // ---------------------------------------------------------------
        // DOM: Build a results table from evaluation response
        // ---------------------------------------------------------------

        function buildResultsTable(response) {
            const rules = (response && response.results) ? response.results : {};
            const ruleNames = Object.keys(rules);

            if (ruleNames.length === 0) return null;

            const table = document.createElement('table');
            table.className = 'results-table';

            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            const headerRule = document.createElement('th');
            headerRule.textContent = 'Rule';
            const headerResult = document.createElement('th');
            headerResult.textContent = 'Result';
            const headerDetails = document.createElement('th');
            headerDetails.textContent = 'Details';
            headerRow.appendChild(headerRule);
            headerRow.appendChild(headerResult);
            headerRow.appendChild(headerDetails);
            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');

            for (const ruleName of ruleNames) {
                const ruleData = rules[ruleName];
                const resultData = ruleData.result;

                const tableRow = document.createElement('tr');

                const nameCell = document.createElement('td');
                nameCell.className = 'rule-name';
                nameCell.textContent = ruleName;
                tableRow.appendChild(nameCell);

                const valueCell = document.createElement('td');
                const detailsCell = document.createElement('td');

                const isVeto = resultData && Object.prototype.hasOwnProperty.call(resultData, 'veto');
                const isValue = resultData && Object.prototype.hasOwnProperty.call(resultData, 'value');

                if (isVeto) {
                    valueCell.className = 'veto';
                    valueCell.textContent = 'Vetoed';
                    detailsCell.className = 'veto';
                    detailsCell.textContent = resultData.veto || 'Vetoed';
                } else if (isValue) {
                    const literal = resultData.value;
                    valueCell.className = 'value';
                    valueCell.textContent = (literal && literal.display_value !== null && literal.display_value !== undefined)
                        ? literal.display_value
                        : JSON.stringify(literal);
                    detailsCell.style.color = '#28a745';
                    const typeKey = (literal && literal.value && typeof literal.value === 'object')
                        ? Object.keys(literal.value)[0] || 'unknown'
                        : 'unknown';
                    detailsCell.textContent = 'Computed (' + typeKey + ')';
                } else {
                    valueCell.textContent = '-';
                    detailsCell.textContent = 'No result';
                }

                tableRow.appendChild(valueCell);
                tableRow.appendChild(detailsCell);
                tbody.appendChild(tableRow);
            }

            table.appendChild(tbody);
            return table;
        }

        // ---------------------------------------------------------------
        // DOM: Build a spec card
        // ---------------------------------------------------------------

        function buildSpecCard(key) {
            loadFactValuesFromStorage(key);
            const schema = state.schemas[key];
            const facts = (schema && Array.isArray(schema.facts)) ? schema.facts : [];

            const card = document.createElement('div');
            card.className = 'spec-card';
            card.dataset.specName = key;

            const heading = document.createElement('h3');
            heading.textContent = 'spec ' + key;
            card.appendChild(heading);

            const factsGrid = document.createElement('div');
            factsGrid.className = 'facts-grid';
            for (const fact of facts) {
                factsGrid.appendChild(buildFactRow(key, fact));
            }
            card.appendChild(factsGrid);

            const actions = document.createElement('div');
            actions.className = 'spec-actions';

            const runButton = document.createElement('button');
            runButton.textContent = 'Run';
            runButton.addEventListener('click', function () {
                runSpec(key);
            });
            actions.appendChild(runButton);

            const clearButton = document.createElement('button');
            clearButton.className = 'secondary';
            clearButton.textContent = 'Clear inputs';
            clearButton.addEventListener('click', function () {
                clearInputs(key);
            });
            actions.appendChild(clearButton);

            card.appendChild(actions);

            const resultsContainer = document.createElement('div');
            resultsContainer.className = 'results-container';
            card.appendChild(resultsContainer);

            return card;
        }

        // ---------------------------------------------------------------
        // Schema diffing and DOM patching
        // ---------------------------------------------------------------

        function patchFactInputs(specName, card, oldFacts, newFacts) {
            const factsGrid = card.querySelector('.facts-grid');
            if (!factsGrid) return;

            const oldByName = {};
            for (const fact of oldFacts) {
                oldByName[fact.name] = fact;
            }

            const newByName = {};
            for (const fact of newFacts) {
                newByName[fact.name] = fact;
            }

            // Remove facts that no longer exist
            for (const oldName of Object.keys(oldByName)) {
                if (!newByName[oldName]) {
                    const existingRow = factsGrid.querySelector('[data-fact-name="' + CSS.escape(oldName) + '"]');
                    if (existingRow) {
                        factsGrid.removeChild(existingRow);
                    }
                    if (state.factValues[specName]) {
                        delete state.factValues[specName][oldName];
                    }
                }
            }

            // Add or update facts
            for (const newFact of newFacts) {
                const name = newFact.name;
                const oldFact = oldByName[name];
                const existingRow = factsGrid.querySelector('[data-fact-name="' + CSS.escape(name) + '"]');

                if (oldFact && existingRow) {
                    const oldKind = specKind(oldFact.schemaType);
                    const newKind = specKind(newFact.schemaType);

                    if (oldKind === newKind) {
                        // Same type kind: keep the existing input and its state value
                        continue;
                    }

                    // Different type kind: replace input, delete old state value
                    if (state.factValues[specName]) {
                        delete state.factValues[specName][name];
                    }
                    const newRow = buildFactRow(specName, newFact);
                    factsGrid.replaceChild(newRow, existingRow);
                } else if (!existingRow) {
                    // New fact: add input
                    const newRow = buildFactRow(specName, newFact);
                    factsGrid.appendChild(newRow);
                }
            }

            // Reorder rows to match new schema order
            for (const newFact of newFacts) {
                const row = factsGrid.querySelector('[data-fact-name="' + CSS.escape(newFact.name) + '"]');
                if (row) {
                    factsGrid.appendChild(row);
                }
            }
        }

        function patchSpecCards() {
            const select = document.getElementById('spec-select');
            const keys = state.specs.map(specKey);
            const prevSelected = select.value;

            select.textContent = '';
            if (keys.length === 0) {
                const opt = document.createElement('option');
                opt.value = '';
                opt.textContent = 'No specs loaded';
                select.appendChild(opt);
            } else {
                for (const key of keys) {
                    const opt = document.createElement('option');
                    opt.value = key;
                    opt.textContent = 'spec ' + key;
                    select.appendChild(opt);
                }
            }

            if (keys.length > 0) {
                select.value = keys.indexOf(prevSelected) !== -1 ? prevSelected : keys[0];
            }

            renderSelectedSpec();
        }

        function renderSelectedSpec() {
            const select = document.getElementById('spec-select');
            const detail = document.getElementById('spec-detail');
            const key = select.value;
            detail.textContent = '';

            if (!key || !state.schemas[key]) return;

            const card = buildSpecCard(key);
            detail.appendChild(card);
        }

        // ---------------------------------------------------------------
        // Engine interaction
        // ---------------------------------------------------------------

        function fetchSchema(key) {
            if (!engine) return null;
            var name = specName(key);
            var effectiveStr = specEffective(key);
            try {
                var schema = engine.show(name, effectiveStr);
                return normalizeSchema(schema);
            } catch (e) {
                console.error('fetchSchema exception for', key, e);
                return null;
            }
        }

        function normalizeSchema(schema) {
            const facts = [];
            if (schema.facts && typeof schema.facts === 'object') {
                for (const [name, tuple] of Object.entries(schema.facts)) {
                    const [lemmaType, defaultValue] = Array.isArray(tuple) ? tuple : [tuple, null];
                    facts.push({
                        name: name,
                        required: true,
                        schemaType: lemmaType,
                        defaultValue: defaultValue
                    });
                }
            }
            return { spec: schema.spec, facts: facts, rules: schema.rules };
        }

        async function loadCode() {
            if (!monacoEditor) return;

            const code = monacoEditor.getValue();

            engine = new Engine();

            try {
                await engine.load(code, 'wasm.lemma');
            } catch (errs) {
                var loadMsg = Array.isArray(errs) ? errs.join('\n') : String(errs);
                setStatus('err', 'Load failed', loadMsg);
                state.specs = [];
                patchSpecCards();
                return;
            }

            let specEntries;
            try {
                specEntries = engine.list();
            } catch (e) {
                setStatus('err', 'Exception listing specs', e.message || String(e));
                state.specs = [];
                patchSpecCards();
                return;
            }

            if (!Array.isArray(specEntries)) {
                console.error('list failed:', specEntries);
                state.specs = [];
                patchSpecCards();
                return;
            }
            const newKeys = specEntries.map(specKey);
            const oldKeys = state.specs.map(specKey);

            for (const oldK of oldKeys) {
                if (newKeys.indexOf(oldK) === -1) {
                    delete state.schemas[oldK];
                    delete state.factValues[oldK];
                    delete state.evalResults[oldK];
                }
            }

            state.specs = specEntries;

            for (const entry of specEntries) {
                const key = specKey(entry);
                try {
                    const effective = entry.effective_from ? datetimeValueToString(entry.effective_from) : null;
                    const schemaObj = engine.show(entry.name, effective);
                    state.schemas[key] = normalizeSchema(schemaObj);
                } catch (e) { console.error('show failed for', key, e); }
            }

            patchSpecCards();
        }

        function scheduleLoad(immediate) {
            if (!engine || !editorReady) return;
            if (loadTimer !== null) {
                clearTimeout(loadTimer);
                loadTimer = null;
            }
            var delay = immediate ? 0 : 300;
            loadTimer = setTimeout(function () {
                loadTimer = null;
                loadCode();
            }, delay);
        }

        // ---------------------------------------------------------------
        // Evaluate and clear
        // ---------------------------------------------------------------

        async function runSpec(key) {
            if (loadTimer !== null) {
                clearTimeout(loadTimer);
                loadTimer = null;
            }
            await loadCode();

            if (!engine) return;

            const name = specName(key);
            const effective = specEffective(key) || '1';
            const factsObj = serializeFactValues(key);

            try {
                const response = engine.run(name, [], factsObj, effective);
                state.evalResults[key] = { success: true, response: response };
            } catch (e) {
                state.evalResults[key] = { success: false, error: e.message || String(e) };
                renderResultsForSpec(key);
                return;
            }
            renderResultsForSpec(key);
        }

        function renderResultsForSpec(specName) {
            const detail = document.getElementById('spec-detail');
            const card = detail.querySelector('.spec-card');
            if (!card) return;

            const resultsContainer = card.querySelector('.results-container');
            if (!resultsContainer) return;

            resultsContainer.textContent = '';

            const evalResult = state.evalResults[specName];
            if (!evalResult) return;

            if (!evalResult.success) {
                const errorMessage = document.createElement('div');
                errorMessage.className = 'result-message error';
                errorMessage.textContent = evalResult.error || 'Unknown error';
                resultsContainer.appendChild(errorMessage);
                return;
            }

            const response = evalResult.response;
            if (!response) return;

            const table = buildResultsTable(response);
            if (table) {
                resultsContainer.appendChild(table);
            }
        }

        function clearInputs(specName) {
            state.factValues[specName] = {};
            persistFactValues(specName);
            delete state.evalResults[specName];

            const detail = document.getElementById('spec-detail');
            const card = detail.querySelector('.spec-card');
            if (!card) return;

            const factsGrid = card.querySelector('.facts-grid');
            if (!factsGrid) return;

            const schema = state.schemas[specName];
            const facts = (schema && Array.isArray(schema.facts)) ? schema.facts : [];

            factsGrid.textContent = '';
            for (const fact of facts) {
                factsGrid.appendChild(buildFactRow(specName, fact));
            }

            const resultsContainer = card.querySelector('.results-container');
            if (resultsContainer) {
                resultsContainer.textContent = '';
            }
        }

        // ---------------------------------------------------------------
        // Initialization (fail loudly: every failure shows in status + console)
        // ---------------------------------------------------------------

        function showError(phase, err) {
            const msg = err && (err.message || String(err));
            setStatus('err', phase, msg || 'Unknown error');
            console.error('Lemma playground [' + phase + ']:', msg, err);
        }

        window.addEventListener('unhandledrejection', function (event) {
            showError('Unhandled error', event.reason);
        });

        const wasmReady = (async function () {
            try {
                setStatus('warn', 'Initializing WASM…');
                await init();
                engine = new Engine();
                setStatus('warn', 'Loading Monaco…');
            } catch (error) {
                showError('WASM failed', error);
                throw error;
            }
        })();

        let editorLoadTimeoutId = null;
        let editorPollId = null;

        function clearEditorLoading() {
            if (editorLoadTimeoutId) { clearTimeout(editorLoadTimeoutId); editorLoadTimeoutId = null; }
            if (editorPollId) { clearInterval(editorPollId); editorPollId = null; }
        }

        async function formatSpec(e = null) {
            if (e) e.preventDefault();
            if (!monacoEditor) return;
            await monacoEditor.getAction('editor.action.formatDocument').run();
            scheduleLoad(true);
        }

        async function initEditor(monaco) {
            if (editorReady) return;
            clearEditorLoading();
            try {
                await wasmReady;
                registerLemmaLanguage(monaco);

                const editorEl = document.getElementById('editor');
                if (!editorEl) throw new Error('DOM element #editor not found');

                monacoEditor = monaco.editor.create(editorEl, {
                    value: `spec pricing
                            type money: scale
                            -> unit eur 1
                            -> unit usd 1.19

                            fact price     : [money]
                            fact quantity  : [number -> minimum 0]
                            fact is_member : false

                            rule discount:
                            0%
                            unless quantity >= 10 then 10%
                            unless quantity >= 50 then 20%
                            unless is_member then 15%

                            rule total:
                            price * quantity - discount
                            unless price > 100 usd then veto "This price is too high."
                    `,

                    language: 'lemma',
                    theme: 'vs',
                    automaticLayout: true,
                    minimap: { enabled: false },
                    scrollBeyondLastLine: false,
                    'semanticHighlighting.enabled': true,
                });

                monacoEditor.onDidChangeModelContent(function () {
                    scheduleLoad(false);
                    if (lspClient) {
                        lspVersion++;
                        lspClient.didChange(DOC_URI, lspVersion, monacoEditor.getValue());
                    }
                });

                document.getElementById('spec-select').addEventListener('change', renderSelectedSpec);

                document.getElementById('format-btn').addEventListener('click', formatSpec);


                editorReady = true;

                try {
                    lspClient = new LspClient(monaco);
                    await lspClient.start(serve, ServerConfig);
                    await lspClient.initialize();

                    lspClient.onDiagnostics(function (uri, diagnostics) {
                        if (!monacoEditor) return;
                        const model = monacoEditor.getModel();
                        if (!model) return;
                        lspClient.setMonacoMarkers(model, diagnostics);

                        if (diagnostics.length === 0) {
                            setStatus('ok', 'Ready');
                        } else {
                            var msgs = diagnostics.map(function (d) { return d.message; });
                            setStatus('err', diagnostics.length + (diagnostics.length === 1 ? ' error' : ' errors'), msgs.join('\n'));
                        }
                    });

                    registerLspProviders(monaco, lspClient, DOC_URI);

                    lspVersion = 1;
                    lspClient.didOpen(DOC_URI, 'lemma', lspVersion, monacoEditor.getValue());
                } catch (lspErr) {
                    console.error('LSP init failed:', lspErr);
                }

                setStatus('ok', 'Ready');
                formatSpec();
                scheduleLoad(true);
            } catch (err) {
                showError('Editor failed', err);
            }
        }

        editorLoadTimeoutId = setTimeout(function () {
            if (editorReady) return;
            clearEditorLoading();
            showError('Editor load timeout', new Error('Monaco did not appear within 25s.'));
        }, 25000);

        editorPollId = setInterval(function () {
            if (editorReady) return;
            const monaco = self.monaco;
            if (!monaco) return;
            clearEditorLoading();
            initEditor(monaco);
        }, 200);

        const loaderRequire = self.require;
        if (!loaderRequire) {
            clearEditorLoading();
            showError('Loader missing', new Error('Monaco loader (require) not on self. Add script src=".../loader.js" before this script.'));
        } else {
            loaderRequire.config({ paths: { vs: 'vendor/vs' } });
            loaderRequire(
                ['vs/editor/editor.main'],
                function (monacoFromModule) {
                    const monaco = monacoFromModule || self.monaco;
                    if (monaco && !editorReady) {
                        initEditor(monaco);
                    } else if (!editorReady) {
                        clearEditorLoading();
                        showError('Monaco API missing', new Error('vs/editor/editor.main loaded but no API (module export or self.monaco).'));
                    }
                },
                function (err) {
                    clearEditorLoading();
                    showError('Monaco failed to load', err && (err.message || err.requireType || err.requireModules) || err);
                }
            );
        }
    </script>
</body>

</html>
