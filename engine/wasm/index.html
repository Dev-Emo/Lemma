<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemma WASM Playground</title>
    <script src="vendor/vs/loader.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
        }

        h1 { color: #333; }

        #editor {
            width: 100%;
            height: 400px;
        }

        .editor-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
        }
        .editor-actions .hint {
            margin-top: 0;
        }
        .editor-actions .format-link {
            color: #666;
            font-size: 13px;
            text-decoration: none;
        }
        .editor-actions .format-link:hover {
            text-decoration: underline;
        }
        .hint {
            margin-top: 8px;
            color: #666;
            font-size: 13px;
        }

        /* --- Editor + status bar (IDE-style) --- */

        .editor-wrap {
            border: 1px solid #ccc;
            border-radius: 3px;
            overflow: hidden;
        }
        .editor-wrap #editor {
            border: none;
            border-radius: 0;
        }
        #status {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 22px;
            padding: 2px 10px;
            border-top: 1px solid #ddd;
            background: #f4f4f4;
            font-size: 12px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            color: #333;
        }
        #status.ok  { background: #f4f4f4; border-top-color: #e8e8e8; }
        #status.err { background: #f8d7da; border-top-color: #dc3545; color: #721c24; }
        #status.warn { background: #fff3cd; border-top-color: #ffc107; color: #856404; }
        #status .status-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- Document cards --- */

        .doc-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
        }
        .doc-card h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
        }

        /* --- Fact input rows --- */

        .facts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        .fact-row {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 10px;
            align-items: center;
        }
        .fact-row .label {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 13px;
            color: #111;
        }
        .fact-row .label .required {
            color: #dc3545;
            font-weight: 700;
            margin-left: 6px;
        }
        .fact-row .input-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .fact-row select,
        .fact-row input {
            width: 100%;
        }
        .fact-row input[type="checkbox"] {
            width: auto;
            transform: translateY(1px);
        }
        .fact-help {
            grid-column: 2 / 3;
            color: #666;
            font-size: 12px;
            margin-top: -6px;
        }

        /* --- Actions row --- */

        .doc-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 10px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 3px;
            cursor: pointer;
            margin: 0;
        }
        button:hover { background: #0056b3; }
        button.secondary { background: #6c757d; }
        button.secondary:hover { background: #5a6268; }

        /* --- Results table --- */

        .results-table {
            margin-top: 10px;
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        .results-table th {
            background: #f0f0f0;
            padding: 10px;
            text-align: left;
            border-bottom: 2px solid #ddd;
        }
        .results-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #eee;
        }
        .results-table .rule-name { font-weight: 500; color: #007bff; }
        .results-table .value { font-family: monospace; }
        .results-table .veto { color: #dc3545; font-style: italic; }

        .result-message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 3px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .result-message.error { background: #f8d7da; border: 1px solid #dc3545; }
        .result-message.success { background: #d4edda; border: 1px solid #28a745; }

        /* --- Responsive --- */

        @media (max-width: 740px) {
            .fact-row { grid-template-columns: 1fr; }
            .fact-help { grid-column: 1 / 2; margin-top: -2px; }
        }
    </style>
</head>
<body>
    <h1>Lemma WASM Playground</h1>

    <div class="section">
        <div class="editor-wrap">
            <div id="editor"></div>
            <div id="status" class="warn">
                <span class="status-text">Initializing…</span>
            </div>
        </div>
        <div class="editor-actions">
            <span class="hint">Edits auto-load. Diagnostics appear inline.</span>
            <a href="#" id="format-btn" class="format-link" title="Format document">Format</a>
        </div>
    </div>

    <div class="section">
        <h2>Documents</h2>
        <div id="docs"></div>
    </div>

    <script type="module">
        import init, { WasmEngine } from '../pkg/lsp.js';
        import { registerLemmaLanguage } from './monaco.js';

        // ---------------------------------------------------------------
        // State
        // ---------------------------------------------------------------

        let engine = null;
        let monacoEditor = null;
        let monacoInstance = null;
        let editorReady = false;
        let loadTimer = null;
        let diagnosticsTimer = null;

        function refreshEditorDiagnostics() {
            if (!engine || !monacoEditor || !monacoInstance) return;
            const model = monacoEditor.getModel();
            if (!model) return;
            const code = monacoEditor.getValue();
            try {
                const raw = engine.getDiagnostics(code, 'wasm.lemma');
                const data = JSON.parse(raw);
                const list = Array.isArray(data) ? data : (data && Array.isArray(data.diagnostics) ? data.diagnostics : []);
                const markers = list.map(function (d) {
                    return {
                        severity: 8,
                        message: d.message || 'Error',
                        startLineNumber: d.startLine || 1,
                        startColumn: d.startColumn || 1,
                        endLineNumber: d.endLine || 1,
                        endColumn: d.endColumn || 1
                    };
                });
                monacoInstance.editor.setModelMarkers(model, 'lemma', markers);
            } catch (_) {}
        }

        const state = {
            docs: [],
            schemas: {},
            factValues: {},
            evalResults: {},
        };

        // ---------------------------------------------------------------
        // Status panel
        // ---------------------------------------------------------------

        function setStatus(kind, title, message) {
            const element = document.getElementById('status');
            element.classList.remove('ok', 'err', 'warn');
            if (kind === 'ok') element.classList.add('ok');
            else if (kind === 'err') element.classList.add('err');
            else element.classList.add('warn');
            const text = message ? title + ': ' + message : (title || '');
            element.querySelector('.status-text').textContent = text;
            element.title = text;
        }

        // ---------------------------------------------------------------
        // Schema introspection
        // ---------------------------------------------------------------

        function specKind(schemaType) {
            const specifications = schemaType && schemaType.specifications;
            if (!specifications || typeof specifications !== 'object') return null;
            const keys = Object.keys(specifications);
            if (keys.length !== 1) return null;
            return keys[0];
        }

        function specData(schemaType) {
            const kind = specKind(schemaType);
            if (kind === null) return null;
            return schemaType.specifications[kind] || null;
        }

        // ---------------------------------------------------------------
        // Fact value serialization (state -> engine JSON)
        // ---------------------------------------------------------------

        function serializeFactValues(docName) {
            const values = state.factValues[docName];
            if (!values) return {};

            const schema = state.schemas[docName];
            if (!schema || !Array.isArray(schema.facts)) return {};

            const result = {};

            for (const fact of schema.facts) {
                const name = fact.name;
                const entry = values[name];
                if (entry === undefined || entry === null) continue;

                const kind = specKind(fact.schemaType);

                if (kind === 'Boolean') {
                    result[name] = entry === true;
                    continue;
                }

                if (kind === 'Scale') {
                    if (typeof entry === 'object' && entry !== null) {
                        const amount = (entry.amount || '').toString().trim();
                        const unit = (entry.unit || '').toString().trim();
                        if (amount === '') continue;
                        if (unit !== '') {
                            result[name] = amount + ' ' + unit;
                        } else {
                            result[name] = Number(amount);
                        }
                    }
                    continue;
                }

                if (kind === 'Ratio') {
                    if (typeof entry === 'object' && entry !== null) {
                        const amount = (entry.amount || '').toString().trim();
                        const unit = (entry.unit || '').toString().trim();
                        if (amount === '') continue;
                        if (unit === 'percent') {
                            result[name] = amount + '%';
                        } else if (unit === 'permille') {
                            result[name] = amount + '%%';
                        } else {
                            result[name] = Number(amount);
                        }
                    }
                    continue;
                }

                if (kind === 'Number') {
                    const stringValue = entry.toString().trim();
                    if (stringValue === '') continue;
                    result[name] = Number(stringValue);
                    continue;
                }

                // Text, Date, Time, Duration: pass as string
                const stringValue = entry.toString().trim();
                if (stringValue !== '') {
                    result[name] = stringValue;
                }
            }

            return result;
        }

        // ---------------------------------------------------------------
        // DOM: Build a fact input row
        // ---------------------------------------------------------------

        function buildFactRow(docName, fact) {
            const name = fact.name;
            const schemaType = fact.schemaType;
            const kind = specKind(schemaType);
            const spec = specData(schemaType);

            const row = document.createElement('div');
            row.className = 'fact-row';
            row.dataset.factName = name;
            row.dataset.typeKind = kind || 'unknown';

            // Label
            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = name;
            if (fact.required) {
                const asterisk = document.createElement('span');
                asterisk.className = 'required';
                asterisk.textContent = '*';
                label.appendChild(asterisk);
            }
            row.appendChild(label);

            // Input group
            const inputGroup = document.createElement('div');
            inputGroup.className = 'input-group';

            // Initialize state entry if missing
            if (!state.factValues[docName]) {
                state.factValues[docName] = {};
            }
            const currentValue = state.factValues[docName][name];

            if (kind === 'Boolean') {
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                if (currentValue === true) {
                    checkbox.checked = true;
                } else if (currentValue === undefined && spec && typeof spec.default === 'boolean') {
                    checkbox.checked = spec.default;
                    state.factValues[docName][name] = spec.default;
                }
                checkbox.addEventListener('change', function () {
                    state.factValues[docName][name] = this.checked;
                });
                inputGroup.appendChild(checkbox);

            } else if (kind === 'Text') {
                const options = (spec && Array.isArray(spec.options)) ? spec.options : [];

                if (options.length > 0) {
                    const select = document.createElement('select');
                    const emptyOption = document.createElement('option');
                    emptyOption.value = '';
                    emptyOption.textContent = '';
                    select.appendChild(emptyOption);
                    for (const optionValue of options) {
                        const option = document.createElement('option');
                        option.value = optionValue;
                        option.textContent = optionValue;
                        select.appendChild(option);
                    }
                    if (typeof currentValue === 'string') {
                        select.value = currentValue;
                    } else if (currentValue === undefined && spec && typeof spec.default === 'string') {
                        select.value = spec.default;
                        state.factValues[docName][name] = spec.default;
                    }
                    select.addEventListener('change', function () {
                        state.factValues[docName][name] = this.value;
                    });
                    inputGroup.appendChild(select);
                } else {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.placeholder = 'text';
                    if (typeof currentValue === 'string') {
                        input.value = currentValue;
                    } else if (currentValue === undefined && spec && typeof spec.default === 'string') {
                        input.value = spec.default;
                        state.factValues[docName][name] = spec.default;
                    }
                    input.addEventListener('input', function () {
                        state.factValues[docName][name] = this.value;
                    });
                    inputGroup.appendChild(input);
                }

            } else if (kind === 'Number') {
                const input = document.createElement('input');
                input.type = 'number';
                input.step = 'any';
                input.placeholder = 'number';
                if (currentValue !== undefined && currentValue !== null) {
                    input.value = currentValue.toString();
                } else if (currentValue === undefined && spec && spec.default !== null && spec.default !== undefined) {
                    input.value = spec.default.toString();
                    state.factValues[docName][name] = spec.default.toString();
                }
                input.addEventListener('input', function () {
                    state.factValues[docName][name] = this.value;
                });
                inputGroup.appendChild(input);

            } else if (kind === 'Scale') {
                const units = (spec && Array.isArray(spec.units)) ? spec.units : [];
                const storedEntry = (typeof currentValue === 'object' && currentValue !== null) ? currentValue : {};

                const amountInput = document.createElement('input');
                amountInput.type = 'number';
                amountInput.step = 'any';
                amountInput.placeholder = units.length > 0 ? 'amount' : 'number';
                if (storedEntry.amount !== undefined) {
                    amountInput.value = storedEntry.amount;
                }

                if (!state.factValues[docName][name] || typeof state.factValues[docName][name] !== 'object') {
                    state.factValues[docName][name] = { amount: storedEntry.amount || '', unit: storedEntry.unit || '' };
                }

                amountInput.addEventListener('input', function () {
                    if (!state.factValues[docName][name] || typeof state.factValues[docName][name] !== 'object') {
                        state.factValues[docName][name] = { amount: '', unit: '' };
                    }
                    state.factValues[docName][name].amount = this.value;
                });
                inputGroup.appendChild(amountInput);

                if (units.length > 0) {
                    const unitSelect = document.createElement('select');
                    const emptyOption = document.createElement('option');
                    emptyOption.value = '';
                    emptyOption.textContent = '';
                    unitSelect.appendChild(emptyOption);
                    for (const unitDefinition of units) {
                        const option = document.createElement('option');
                        option.value = unitDefinition.name;
                        option.textContent = unitDefinition.name;
                        unitSelect.appendChild(option);
                    }
                    if (storedEntry.unit) {
                        unitSelect.value = storedEntry.unit;
                    }
                    unitSelect.addEventListener('change', function () {
                        state.factValues[docName][name].unit = this.value;
                    });
                    inputGroup.appendChild(unitSelect);
                }

            } else if (kind === 'Ratio') {
                const units = (spec && Array.isArray(spec.units)) ? spec.units : [];
                const storedEntry = (typeof currentValue === 'object' && currentValue !== null) ? currentValue : {};

                const amountInput = document.createElement('input');
                amountInput.type = 'number';
                amountInput.step = 'any';
                amountInput.placeholder = 'amount';
                if (storedEntry.amount !== undefined) {
                    amountInput.value = storedEntry.amount;
                }

                if (!state.factValues[docName][name] || typeof state.factValues[docName][name] !== 'object') {
                    state.factValues[docName][name] = { amount: storedEntry.amount || '', unit: storedEntry.unit || 'ratio' };
                }

                amountInput.addEventListener('input', function () {
                    if (!state.factValues[docName][name] || typeof state.factValues[docName][name] !== 'object') {
                        state.factValues[docName][name] = { amount: '', unit: 'ratio' };
                    }
                    state.factValues[docName][name].amount = this.value;
                });
                inputGroup.appendChild(amountInput);

                const unitSelect = document.createElement('select');
                const ratioOption = document.createElement('option');
                ratioOption.value = 'ratio';
                ratioOption.textContent = 'ratio';
                unitSelect.appendChild(ratioOption);
                for (const unitDefinition of units) {
                    const option = document.createElement('option');
                    option.value = unitDefinition.name;
                    option.textContent = unitDefinition.name === 'percent' ? '%' : unitDefinition.name;
                    unitSelect.appendChild(option);
                }
                if (storedEntry.unit) {
                    unitSelect.value = storedEntry.unit;
                }
                unitSelect.addEventListener('change', function () {
                    state.factValues[docName][name].unit = this.value;
                });
                inputGroup.appendChild(unitSelect);

            } else if (kind === 'Date') {
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = 'YYYY-MM-DD';
                if (typeof currentValue === 'string') {
                    input.value = currentValue;
                }
                input.addEventListener('input', function () {
                    state.factValues[docName][name] = this.value;
                });
                inputGroup.appendChild(input);

            } else if (kind === 'Time') {
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = 'HH:MM[:SS]';
                if (typeof currentValue === 'string') {
                    input.value = currentValue;
                }
                input.addEventListener('input', function () {
                    state.factValues[docName][name] = this.value;
                });
                inputGroup.appendChild(input);

            } else if (kind === 'Duration') {
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = 'e.g. 5 days';
                if (typeof currentValue === 'string') {
                    input.value = currentValue;
                }
                input.addEventListener('input', function () {
                    state.factValues[docName][name] = this.value;
                });
                inputGroup.appendChild(input);

            } else {
                const input = document.createElement('input');
                input.type = 'text';
                input.placeholder = 'value';
                if (typeof currentValue === 'string') {
                    input.value = currentValue;
                }
                input.addEventListener('input', function () {
                    state.factValues[docName][name] = this.value;
                });
                inputGroup.appendChild(input);
            }

            row.appendChild(inputGroup);

            // Help text
            const helpText = (spec && typeof spec.help === 'string' && spec.help.trim() !== '') ? spec.help.trim() : null;
            if (helpText !== null) {
                const helpElement = document.createElement('div');
                helpElement.className = 'fact-help';
                helpElement.textContent = helpText;
                row.appendChild(helpElement);
            }

            return row;
        }

        // ---------------------------------------------------------------
        // DOM: Build a results table from evaluation response
        // ---------------------------------------------------------------

        function buildResultsTable(response) {
            const rules = (response && response.results) ? response.results : {};
            const ruleNames = Object.keys(rules);

            if (ruleNames.length === 0) return null;

            const table = document.createElement('table');
            table.className = 'results-table';

            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            const headerRule = document.createElement('th');
            headerRule.textContent = 'Rule';
            const headerResult = document.createElement('th');
            headerResult.textContent = 'Result';
            const headerDetails = document.createElement('th');
            headerDetails.textContent = 'Details';
            headerRow.appendChild(headerRule);
            headerRow.appendChild(headerResult);
            headerRow.appendChild(headerDetails);
            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');

            for (const ruleName of ruleNames) {
                const ruleData = rules[ruleName];
                const resultData = ruleData.result;

                const tableRow = document.createElement('tr');

                const nameCell = document.createElement('td');
                nameCell.className = 'rule-name';
                nameCell.textContent = ruleName;
                tableRow.appendChild(nameCell);

                const valueCell = document.createElement('td');
                const detailsCell = document.createElement('td');

                const isVeto = resultData && Object.prototype.hasOwnProperty.call(resultData, 'veto');
                const isValue = resultData && Object.prototype.hasOwnProperty.call(resultData, 'value');

                if (isVeto) {
                    valueCell.className = 'veto';
                    valueCell.textContent = 'Vetoed';
                    detailsCell.className = 'veto';
                    detailsCell.textContent = resultData.veto || 'Vetoed';
                } else if (isValue) {
                    const literal = resultData.value;
                    valueCell.className = 'value';
                    valueCell.textContent = (literal && literal.display_value !== null && literal.display_value !== undefined)
                        ? literal.display_value
                        : JSON.stringify(literal);
                    detailsCell.style.color = '#28a745';
                    const typeKey = (literal && literal.value && typeof literal.value === 'object')
                        ? Object.keys(literal.value)[0] || 'unknown'
                        : 'unknown';
                    detailsCell.textContent = 'Computed (' + typeKey + ')';
                } else {
                    valueCell.textContent = '-';
                    detailsCell.textContent = 'No result';
                }

                tableRow.appendChild(valueCell);
                tableRow.appendChild(detailsCell);
                tbody.appendChild(tableRow);
            }

            table.appendChild(tbody);
            return table;
        }

        // ---------------------------------------------------------------
        // DOM: Build a doc card
        // ---------------------------------------------------------------

        function buildDocCard(docName) {
            const schema = state.schemas[docName];
            const facts = (schema && Array.isArray(schema.facts)) ? schema.facts : [];

            const card = document.createElement('div');
            card.className = 'doc-card';
            card.dataset.docName = docName;

            const heading = document.createElement('h3');
            heading.textContent = 'doc ' + docName;
            card.appendChild(heading);

            const factsGrid = document.createElement('div');
            factsGrid.className = 'facts-grid';
            for (const fact of facts) {
                factsGrid.appendChild(buildFactRow(docName, fact));
            }
            card.appendChild(factsGrid);

            const actions = document.createElement('div');
            actions.className = 'doc-actions';

            const evaluateButton = document.createElement('button');
            evaluateButton.textContent = 'Evaluate';
            evaluateButton.addEventListener('click', function () {
                evaluateDoc(docName);
            });
            actions.appendChild(evaluateButton);

            const clearButton = document.createElement('button');
            clearButton.className = 'secondary';
            clearButton.textContent = 'Clear inputs';
            clearButton.addEventListener('click', function () {
                clearInputs(docName);
            });
            actions.appendChild(clearButton);

            card.appendChild(actions);

            const resultsContainer = document.createElement('div');
            resultsContainer.className = 'results-container';
            card.appendChild(resultsContainer);

            return card;
        }

        // ---------------------------------------------------------------
        // Schema diffing and DOM patching
        // ---------------------------------------------------------------

        function patchFactInputs(docName, card, oldFacts, newFacts) {
            const factsGrid = card.querySelector('.facts-grid');
            if (!factsGrid) return;

            const oldByName = {};
            for (const fact of oldFacts) {
                oldByName[fact.name] = fact;
            }

            const newByName = {};
            for (const fact of newFacts) {
                newByName[fact.name] = fact;
            }

            // Remove facts that no longer exist
            for (const oldName of Object.keys(oldByName)) {
                if (!newByName[oldName]) {
                    const existingRow = factsGrid.querySelector('[data-fact-name="' + CSS.escape(oldName) + '"]');
                    if (existingRow) {
                        factsGrid.removeChild(existingRow);
                    }
                    if (state.factValues[docName]) {
                        delete state.factValues[docName][oldName];
                    }
                }
            }

            // Add or update facts
            for (const newFact of newFacts) {
                const name = newFact.name;
                const oldFact = oldByName[name];
                const existingRow = factsGrid.querySelector('[data-fact-name="' + CSS.escape(name) + '"]');

                if (oldFact && existingRow) {
                    const oldKind = specKind(oldFact.schemaType);
                    const newKind = specKind(newFact.schemaType);

                    if (oldKind === newKind) {
                        // Same type kind: keep the existing input and its state value
                        continue;
                    }

                    // Different type kind: replace input, delete old state value
                    if (state.factValues[docName]) {
                        delete state.factValues[docName][name];
                    }
                    const newRow = buildFactRow(docName, newFact);
                    factsGrid.replaceChild(newRow, existingRow);
                } else if (!existingRow) {
                    // New fact: add input
                    const newRow = buildFactRow(docName, newFact);
                    factsGrid.appendChild(newRow);
                }
            }

            // Reorder rows to match new schema order
            for (const newFact of newFacts) {
                const row = factsGrid.querySelector('[data-fact-name="' + CSS.escape(newFact.name) + '"]');
                if (row) {
                    factsGrid.appendChild(row);
                }
            }
        }

        function patchDocCards() {
            const container = document.getElementById('docs');
            const newDocs = state.docs;

            // Build set of current card doc names
            const existingCards = container.querySelectorAll('.doc-card[data-doc-name]');
            const existingDocNames = new Set();
            for (const card of existingCards) {
                existingDocNames.add(card.dataset.docName);
            }

            const newDocNames = new Set(newDocs);

            // Remove cards for docs that no longer exist
            for (const card of existingCards) {
                const docName = card.dataset.docName;
                if (!newDocNames.has(docName)) {
                    container.removeChild(card);
                    delete state.factValues[docName];
                    delete state.evalResults[docName];
                }
            }

            // Add or update cards for current docs
            for (const docName of newDocs) {
                const existingCard = container.querySelector('.doc-card[data-doc-name="' + CSS.escape(docName) + '"]');

                if (existingCard) {
                    // Doc exists: diff its facts
                    const oldSchema = state.schemas[docName];
                    const newSchema = fetchSchema(docName);
                    if (newSchema) {
                        const oldFacts = (oldSchema && Array.isArray(oldSchema.facts)) ? oldSchema.facts : [];
                        const newFacts = Array.isArray(newSchema.facts) ? newSchema.facts : [];
                        patchFactInputs(docName, existingCard, oldFacts, newFacts);
                        state.schemas[docName] = newSchema;
                    }

                    // Clear stale results
                    const resultsContainer = existingCard.querySelector('.results-container');
                    if (resultsContainer) {
                        resultsContainer.textContent = '';
                    }
                    delete state.evalResults[docName];
                } else {
                    // New doc: fetch schema and build card
                    const newSchema = fetchSchema(docName);
                    if (newSchema) {
                        state.schemas[docName] = newSchema;
                        const card = buildDocCard(docName);
                        container.appendChild(card);
                    }
                }
            }

            // Reorder cards to match doc order
            for (const docName of newDocs) {
                const card = container.querySelector('.doc-card[data-doc-name="' + CSS.escape(docName) + '"]');
                if (card) {
                    container.appendChild(card);
                }
            }

            // Show hint if no docs
            let hintElement = container.querySelector('.no-docs-hint');
            if (newDocs.length === 0) {
                if (!hintElement) {
                    hintElement = document.createElement('div');
                    hintElement.className = 'hint no-docs-hint';
                    hintElement.textContent = 'No documents loaded yet.';
                    container.appendChild(hintElement);
                }
            } else if (hintElement) {
                container.removeChild(hintElement);
            }
        }

        // ---------------------------------------------------------------
        // Engine interaction
        // ---------------------------------------------------------------

        function fetchSchema(docName) {
            if (!engine) return null;
            let response;
            try {
                response = JSON.parse(engine.getRequiredFacts(docName, '[]'));
            } catch (parseError) {
                return null;
            }
            if (!response || !response.success || !response.doc) return null;
            return response.doc;
        }

        async function loadCode() {
            if (!monacoEditor) return;

            const code = monacoEditor.getValue();

            engine = new WasmEngine();

            let addResult;
            try {
                const raw = await engine.addLemmaFile(code, 'wasm.lemma');
                addResult = JSON.parse(raw);
            } catch (parseError) {
                setStatus('err', 'Exception while loading', parseError.message || String(parseError));
                return;
            }

            if (!addResult || !addResult.success) {
                setStatus('err', 'Error while loading', addResult && addResult.error ? addResult.error : 'Unknown error');
                // Clear docs on compile error
                state.docs = [];
                patchDocCards();
                return;
            }

            setStatus('ok', 'Loaded', 'Documents compiled successfully.');

            // Fetch new doc list
            let listResult;
            try {
                listResult = JSON.parse(engine.listDocuments());
            } catch (parseError) {
                setStatus('err', 'Exception listing documents', parseError.message || String(parseError));
                return;
            }

            if (!listResult || !listResult.success) {
                state.docs = [];
                patchDocCards();
                return;
            }

            const newDocs = Array.isArray(listResult.documents) ? listResult.documents.slice().sort() : [];

            // Clean up state for removed docs
            for (const oldDocName of state.docs) {
                if (newDocs.indexOf(oldDocName) === -1) {
                    delete state.schemas[oldDocName];
                    delete state.factValues[oldDocName];
                    delete state.evalResults[oldDocName];
                }
            }

            state.docs = newDocs;
            patchDocCards();
            refreshEditorDiagnostics();
        }

        function scheduleLoad(immediate) {
            if (!engine || !editorReady) return;
            if (loadTimer !== null) {
                clearTimeout(loadTimer);
                loadTimer = null;
            }
            var delay = immediate ? 0 : 300;
            loadTimer = setTimeout(function () {
                loadTimer = null;
                loadCode();
            }, delay);
        }

        // ---------------------------------------------------------------
        // Evaluate and clear
        // ---------------------------------------------------------------

        async function evaluateDoc(docName) {
            if (loadTimer !== null) {
                clearTimeout(loadTimer);
                loadTimer = null;
            }
            await loadCode();

            if (!engine) return;

            const factsJson = JSON.stringify(serializeFactValues(docName));

            let evalResult;
            try {
                evalResult = JSON.parse(engine.evaluate(docName, factsJson));
            } catch (parseError) {
                state.evalResults[docName] = { success: false, error: parseError.message || String(parseError) };
                renderResultsForDoc(docName);
                return;
            }

            state.evalResults[docName] = evalResult;
            renderResultsForDoc(docName);
        }

        function renderResultsForDoc(docName) {
            const container = document.getElementById('docs');
            const card = container.querySelector('.doc-card[data-doc-name="' + CSS.escape(docName) + '"]');
            if (!card) return;

            const resultsContainer = card.querySelector('.results-container');
            if (!resultsContainer) return;

            resultsContainer.textContent = '';

            const evalResult = state.evalResults[docName];
            if (!evalResult) return;

            if (!evalResult.success) {
                const errorMessage = document.createElement('div');
                errorMessage.className = 'result-message error';
                errorMessage.textContent = evalResult.error || 'Unknown error';
                resultsContainer.appendChild(errorMessage);
                return;
            }

            const response = evalResult.response;
            if (!response) return;

            const table = buildResultsTable(response);
            if (table) {
                resultsContainer.appendChild(table);
            }
        }

        function clearInputs(docName) {
            state.factValues[docName] = {};
            delete state.evalResults[docName];

            // Re-render the fact inputs from schema with empty state
            const container = document.getElementById('docs');
            const card = container.querySelector('.doc-card[data-doc-name="' + CSS.escape(docName) + '"]');
            if (!card) return;

            const factsGrid = card.querySelector('.facts-grid');
            if (!factsGrid) return;

            const schema = state.schemas[docName];
            const facts = (schema && Array.isArray(schema.facts)) ? schema.facts : [];

            factsGrid.textContent = '';
            for (const fact of facts) {
                factsGrid.appendChild(buildFactRow(docName, fact));
            }

            const resultsContainer = card.querySelector('.results-container');
            if (resultsContainer) {
                resultsContainer.textContent = '';
            }
        }

        // ---------------------------------------------------------------
        // Initialization (fail loudly: every failure shows in status + console)
        // ---------------------------------------------------------------

        function showError(phase, err) {
            const msg = err && (err.message || String(err));
            setStatus('err', phase, msg || 'Unknown error');
            console.error('Lemma playground [' + phase + ']:', msg, err);
        }

        window.addEventListener('unhandledrejection', function (event) {
            showError('Unhandled error', event.reason);
        });

        const wasmReady = (async function () {
            try {
                setStatus('warn', 'Initializing WASM…');
                await init();
                engine = new WasmEngine();
                setStatus('warn', 'Loading Monaco…');
            } catch (error) {
                showError('WASM failed', error);
                throw error;
            }
        })();

        let editorLoadTimeoutId = null;
        let editorPollId = null;

        function clearEditorLoading() {
            if (editorLoadTimeoutId) { clearTimeout(editorLoadTimeoutId); editorLoadTimeoutId = null; }
            if (editorPollId) { clearInterval(editorPollId); editorPollId = null; }
        }

        async function initEditor(monaco) {
            if (editorReady) return;
            clearEditorLoading();
            try {
                registerLemmaLanguage(monaco);

                const editorEl = document.getElementById('editor');
                if (!editorEl) throw new Error('DOM element #editor not found');

                monacoEditor = monaco.editor.create(editorEl, {
                    value: [
                        'doc pricing',
                        '',
                        'type money = scale',
                        '  -> unit eur 1',
                        '  -> unit usd 1.19',
                        '',
                        'fact quantity = 10',
                        'fact is_member = false',
                        'fact price = [money]',
                        '',
                        'rule discount = 0%',
                        '  unless quantity >= 10 then 10%',
                        '  unless quantity >= 50 then 20%',
                        '  unless is_member then 15%',
                        '',
                        'rule total = price - discount?',
                        '  unless price > 100 usd then veto "This price is too high."',
                        '',
                    ].join('\n'),
                    language: 'lemma',
                    theme: 'vs',
                    automaticLayout: true,
                    minimap: { enabled: false },
                    scrollBeyondLastLine: false,
                });

                monacoInstance = monaco;
                monacoEditor.onDidChangeModelContent(function () {
                    scheduleLoad(false);
                    if (diagnosticsTimer) clearTimeout(diagnosticsTimer);
                    diagnosticsTimer = setTimeout(function () {
                        diagnosticsTimer = null;
                        refreshEditorDiagnostics();
                    }, 300);
                });

                document.getElementById('format-btn').addEventListener('click', function (e) {
                    e.preventDefault();
                    if (!engine || !monacoEditor) return;
                    const code = monacoEditor.getValue();
                    const raw = engine.formatSource(code, 'wasm.lemma');
                    try {
                        const result = JSON.parse(raw);
                        if (result.success && result.formatted !== undefined) {
                            monacoEditor.setValue(result.formatted);
                            refreshEditorDiagnostics();
                            scheduleLoad(true);
                        } else if (!result.success && result.error) {
                            setStatus('err', 'Format failed', result.error);
                        }
                    } catch (_) {
                        setStatus('err', 'Format failed', raw || 'Unknown error');
                    }
                });

                editorReady = true;
                setStatus('ok', 'Ready');
                refreshEditorDiagnostics();
                scheduleLoad(true);
            } catch (err) {
                showError('Editor failed', err);
            }
        }

        editorLoadTimeoutId = setTimeout(function () {
            if (editorReady) return;
            clearEditorLoading();
            showError('Editor load timeout', new Error('Monaco did not appear within 25s.'));
        }, 25000);

        editorPollId = setInterval(function () {
            if (editorReady) return;
            const monaco = self.monaco;
            if (!monaco) return;
            clearEditorLoading();
            initEditor(monaco);
        }, 200);

        const loaderRequire = self.require;
        if (!loaderRequire) {
            clearEditorLoading();
            showError('Loader missing', new Error('Monaco loader (require) not on self. Add script src=".../loader.js" before this script.'));
        } else {
            loaderRequire.config({ paths: { vs: 'vendor/vs' } });
            loaderRequire(
                ['vs/editor/editor.main'],
                function (monacoFromModule) {
                    const monaco = monacoFromModule || self.monaco;
                    if (monaco && !editorReady) {
                        initEditor(monaco);
                    } else if (!editorReady) {
                        clearEditorLoading();
                        showError('Monaco API missing', new Error('vs/editor/editor.main loaded but no API (module export or self.monaco).'));
                    }
                },
                function (err) {
                    clearEditorLoading();
                    showError('Monaco failed to load', err && (err.message || err.requireType || err.requireModules) || err);
                }
            );
        }
    </script>
</body>
</html>
