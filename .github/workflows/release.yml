name: Release

on:
  workflow_run:
    workflows: ["Quality"]
    types: [completed]
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  detect-version-changes:
    name: Detect Version Changes
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version changes
        id: check
        run: |
          # Read version from workspace Cargo.toml (single source of truth)
          CURRENT_VERSION=$(grep '^\[workspace.package\]' -A 10 Cargo.toml | grep '^version = ' | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          # For manual trigger, always consider changed
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get the latest tag (last published version)
          LATEST_TAG=$(git describe --tags --abbrev=0 --match "cli-v*" 2>/dev/null || echo "cli-v0.0.0")
          TAG_VERSION=${LATEST_TAG#cli-v}

          echo "Current version: $CURRENT_VERSION"
          echo "Latest tag version: $TAG_VERSION"

          # Check if workspace version changed compared to latest tag
          if [ "$CURRENT_VERSION" != "$TAG_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  create-release:
    name: Create Release
    needs: detect-version-changes
    if: needs.detect-version-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="${{ needs.detect-version-changes.outputs.version }}"
          for prefix in lemma-engine openapi wasm cli; do
            git tag "${prefix}-v${VERSION}" 2>/dev/null || echo "Tag ${prefix}-v${VERSION} already exists"
            git push origin "${prefix}-v${VERSION}" 2>/dev/null || echo "Tag ${prefix}-v${VERSION} already pushed"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cli-v${{ needs.detect-version-changes.outputs.version }}
          name: Lemma v${{ needs.detect-version-changes.outputs.version }}
          body: |
            ## Installation

            Download the binary for your platform from the assets below, or install from source:

            ```bash
            cargo install lemma-cli@${{ needs.detect-version-changes.outputs.version }}
            ```

            Or use the library in your Rust project:

            ```bash
            cargo add lemma-engine@${{ needs.detect-version-changes.outputs.version }}
            ```

            Or use WebAssembly in your browser:

            ```bash
            npm install @lemmabase/lemma-engine@${{ needs.detect-version-changes.outputs.version }}
            ```

            Or use the Elixir package:

            ```elixir
            {:lemma_engine, "~> ${{ needs.detect-version-changes.outputs.version }}"}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-cli-binaries:
    name: Build CLI (${{ matrix.target }})
    needs: [detect-version-changes, create-release]
    if: needs.detect-version-changes.outputs.changed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use-cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use-cross: true
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross == true
        uses: taiki-e/install-action@cross

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.use-cross }}" == "true" ]; then
            cross build --release -p lemma-cli --target ${{ matrix.target }}
          else
            cargo build --release -p lemma-cli --target ${{ matrix.target }}
          fi

      - name: Verify static Linux binary
        if: contains(matrix.target, 'linux-musl')
        shell: bash
        run: |
          B="target/${{ matrix.target }}/release/lemma"
          file "$B"
          file "$B" | grep -Eiq 'statically linked|static-pie' || {
            echo "error: expected static musl binary (scratch Docker)"
            exit 1
          }

      - name: Package binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ runner.os }}" == "Windows" ]; then
            7z a ../../../lemma-${{ matrix.target }}.zip lemma.exe
          else
            tar czf ../../../lemma-${{ matrix.target }}.tar.gz lemma
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cli-v${{ needs.detect-version-changes.outputs.version }}
          files: lemma-${{ matrix.target }}.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-nif-binaries:
    name: Build NIF (${{ matrix.job.target }})
    needs: [detect-version-changes, create-release]
    if: needs.detect-version-changes.outputs.changed == 'true'
    runs-on: ${{ matrix.job.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        nif: ["2.15"]
        job:
          - { target: aarch64-apple-darwin,      os: macos-latest }
          - { target: x86_64-apple-darwin,       os: macos-15-intel }
          - { target: aarch64-unknown-linux-gnu,  os: ubuntu-latest, use-cross: true }
          - { target: x86_64-unknown-linux-gnu,   os: ubuntu-latest }
          - { target: x86_64-pc-windows-msvc,     os: windows-latest }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          targets: ${{ matrix.job.target }}

      - name: Install cross
        if: matrix.job.use-cross
        uses: taiki-e/install-action@cross

      - name: Build NIF
        shell: bash
        run: |
          if [ "${{ matrix.job.use-cross }}" == "true" ]; then
            cross build --release -p lemma_hex --target ${{ matrix.job.target }}
          else
            cargo build --release -p lemma_hex --target ${{ matrix.job.target }}
          fi

      - name: Package NIF library
        shell: bash
        run: |
          VERSION="${{ needs.detect-version-changes.outputs.version }}"
          NIF_VERSION="${{ matrix.nif }}"
          TARGET="${{ matrix.job.target }}"
          RELEASE_DIR="target/${TARGET}/release"

          case "${{ runner.os }}" in
            Windows)
              LIB_NAME="lemma_hex-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.dll"
              cp "${RELEASE_DIR}/lemma_hex.dll" "${LIB_NAME}" ;;
            macOS)
              LIB_NAME="liblemma_hex-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.so"
              cp "${RELEASE_DIR}/liblemma_hex.dylib" "${LIB_NAME}" ;;
            *)
              LIB_NAME="liblemma_hex-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.so"
              cp "${RELEASE_DIR}/liblemma_hex.so" "${LIB_NAME}" ;;
          esac

          tar czf "${LIB_NAME}.tar.gz" "${LIB_NAME}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cli-v${{ needs.detect-version-changes.outputs.version }}
          files: "*lemma_hex-*.tar.gz"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish jobs run in parallel (no dependencies between them). If one fails
  # (e.g. auth/expired token), update the secret and use "Re-run failed jobs".
  publish-crates:
    name: Publish to crates.io
    needs: [detect-version-changes, create-release]
    if: |
      !cancelled() &&
      needs.create-release.result == 'success' &&
      needs.detect-version-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0

      - name: Publish lemma-engine
        run: cargo publish -p lemma-engine --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish lemma-openapi
        run: cargo publish -p lemma-openapi --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish lemma-cli
        run: cargo publish -p lemma-cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: [detect-version-changes, create-release]
    if: |
      !cancelled() &&
      needs.create-release.result == 'success' &&
      needs.detect-version-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    env:
      WASM_PACK_VERSION: 0.14.0
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-publish-npm-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-publish-npm-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache wasm-pack binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: wasm-pack-${{ env.WASM_PACK_VERSION }}-${{ runner.os }}

      - name: Install wasm-pack
        run: cargo install wasm-pack --version ${{ env.WASM_PACK_VERSION }} --locked --force

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Build WASM
        working-directory: engine/packages/npm
        run: |
          node build.js

      - name: Publish to npm
        working-directory: engine/packages/npm/dist
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-vscode:
    name: Publish VS Code Extension
    needs: [detect-version-changes, create-release]
    if: |
      !cancelled() &&
      needs.create-release.result == 'success' &&
      needs.detect-version-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: engine/lsp/editors/vscode
        run: npm ci

      - name: Compile extension
        working-directory: engine/lsp/editors/vscode
        run: npm run compile

      - name: Publish to Marketplace
        working-directory: engine/lsp/editors/vscode
        run: npx vsce publish -p ${{ secrets.VSCE_PAT }}

  publish-hex:
    name: Publish to Hex.pm
    needs: [detect-version-changes, create-release, publish-crates, build-nif-binaries]
    if: |
      !cancelled() &&
      needs.create-release.result == 'success' &&
      needs.publish-crates.result == 'success' &&
      needs.build-nif-binaries.result == 'success' &&
      needs.detect-version-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0

      - name: Setup Erlang & Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28.4'
          elixir-version: '1.19.5'

      - name: Rewrite NIF Cargo.toml for standalone build
        working-directory: engine/packages/hex
        run: |
          VERSION="${{ needs.detect-version-changes.outputs.version }}"
          cd native/lemma_hex
          sed -i 's|^version\.workspace = true|version = "'"${VERSION}"'"|' Cargo.toml
          sed -i 's|^edition\.workspace = true|edition = "2021"|' Cargo.toml
          sed -i '/^authors\.workspace/d' Cargo.toml
          sed -i '/^license\.workspace/d' Cargo.toml
          sed -i '/^repository\.workspace/d' Cargo.toml
          sed -i 's|^lemma-engine = { path = "../../../../" }|lemma-engine = "='"${VERSION}"'"|' Cargo.toml
          sed -i 's|^serde_json\.workspace = true|serde_json = "1.0"|' Cargo.toml
          echo "--- Cargo.toml after rewrite ---"
          cat Cargo.toml

      - name: Install mix deps
        working-directory: engine/packages/hex
        run: mix deps.get

      - name: Generate NIF checksums
        working-directory: engine/packages/hex
        run: mix rustler_precompiled.download Lemma.Native --all --print
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Hex
        working-directory: engine/packages/hex
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

  publish-docker:
    name: Publish Docker Image
    needs: [detect-version-changes, create-release, build-cli-binaries]
    if: |
      !cancelled() &&
      needs.create-release.result == 'success' &&
      needs.build-cli-binaries.result == 'success' &&
      needs.detect-version-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binaries from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.detect-version-changes.outputs.version }}"
          TAG="cli-v${VERSION}"
          mkdir -p binaries/amd64 binaries/arm64
          gh release download "$TAG" -p "lemma-x86_64-unknown-linux-musl.tar.gz" -D /tmp
          gh release download "$TAG" -p "lemma-aarch64-unknown-linux-musl.tar.gz" -D /tmp
          tar xzf /tmp/lemma-x86_64-unknown-linux-musl.tar.gz -C binaries/amd64
          tar xzf /tmp/lemma-aarch64-unknown-linux-musl.tar.gz -C binaries/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.detect-version-changes.outputs.version }}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
